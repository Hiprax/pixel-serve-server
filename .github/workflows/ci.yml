name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded pushes on the same ref so the queue doesn't pile up. Tag
# pushes (handled by release.yml) are excluded by the branch filter above.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Bump at the job level if a future step needs more.
permissions:
  contents: read

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    # Cap each leg so a hung install / Sharp native build cannot burn the
    # runner budget.
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
          - 24.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Tests don't read git history; not persisting credentials reduces
          # token exposure if a malicious dependency runs during the job.
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check types pack
        run: npm run check-types-pack

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Test
        run: npm test

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          slug: Hiprax/pixel-serve-server
