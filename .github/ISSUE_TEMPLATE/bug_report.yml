name: Bug report
description: Report a problem with pixel-serve-server
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more concrete the reproduction, the faster it can be fixed.
  - type: input
    id: version
    attributes:
      label: "Package version"
      description: "Run `npm ls pixel-serve-server` or check your `package.json`."
      placeholder: "2.8.2"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: "Node.js version"
      description: "Run `node --version`."
      placeholder: "v22.11.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating system"
      options:
        - Linux
        - macOS
        - Windows
        - Other (note in description)
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: "registerServe options"
      description: "Paste the (redacted) options object you passed to `registerServe`."
      render: typescript
    validations:
      required: false
  - type: textarea
    id: request
    attributes:
      label: "Request that triggered the bug"
      description: "URL + query params (e.g. `/api/v1/pixel/serve?src=...&width=...`). Redact anything sensitive."
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction"
      description: "Minimal code that reproduces the bug. Inline snippet or a link to a small repo."
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: "Include the full error output / stack trace if applicable. If `onError` fired, include the `phase` value."
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: "Additional context"
      description: "Sharp version, libvips version, image source, anything else relevant."
