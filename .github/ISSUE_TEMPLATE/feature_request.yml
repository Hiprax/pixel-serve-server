name: Feature request
description: Suggest a new feature or enhancement for pixel-serve-server
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve?"
      description: "Describe the use case or pain point. Real-world examples are best."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution"
      description: "What should the API or behavior look like?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Other approaches you thought about and why they did not fit."
  - type: textarea
    id: extra
    attributes:
      label: "Additional context"
